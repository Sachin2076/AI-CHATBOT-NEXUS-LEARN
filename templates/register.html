<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Create Account — Nexus Learn</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/static/css/style.css"/>
<script src="/static/js/theme.js"></script>
</head>
<body>
<nav class="navbar">
  <div class="brand" onclick="location.href='/'"><div class="brand-icon">⬡</div>NEXUS LEARN</div>
  <div class="nav-r">
    <span class="tx-m" style="font-size:13px">Have an account?</span>
    <a href="/login" class="btn btn-outline btn-sm">Sign In</a>
  </div>
</nav>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-mark">⬡</div>
      <h2>Create account</h2>
      <p>Join and start your AI-guided learning</p>
    </div>
    <div id="err" class="alert alert-err hidden"></div>
    <div id="ok"  class="alert alert-ok  hidden"></div>
    <div class="fg"><label class="fl">Full name</label><input class="fi" id="name" type="text" placeholder="Alex Johnson" autocomplete="name"/></div>
    <div class="fg"><label class="fl">Email address</label><input class="fi" id="email" type="email" placeholder="you@example.com" autocomplete="email"/></div>
    <div class="fg"><label class="fl">Password</label><input class="fi" id="pw" type="password" placeholder="Min. 8 characters" autocomplete="new-password"/></div>
    <div class="fg"><label class="fl">Confirm password</label><input class="fi" id="pw2" type="password" placeholder="Repeat password" autocomplete="new-password"/></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center" id="btn" onclick="doRegister()">Create Account</button>
    <div class="auth-foot">Already have an account? <a href="/login">Sign in</a></div>
  </div>
</div>
<script>
async function doRegister(){
  const name=document.getElementById('name').value.trim();
  const email=document.getElementById('email').value.trim();
  const pw=document.getElementById('pw').value;
  const pw2=document.getElementById('pw2').value;
  const err=document.getElementById('err');
  const ok=document.getElementById('ok');
  err.classList.add('hidden');ok.classList.add('hidden');
  if(!name||!email||!pw){err.textContent='All fields are required.';err.classList.remove('hidden');return;}
  if(pw!==pw2){err.textContent='Passwords do not match.';err.classList.remove('hidden');return;}
  if(pw.length<8){err.textContent='Password must be at least 8 characters.';err.classList.remove('hidden');return;}
  const btn=document.getElementById('btn');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span> Creating account…';
  try{
    const r=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,password:pw})});
    const d=await r.json();
    if(r.ok&&d.success){ok.textContent='Account created! Redirecting…';ok.classList.remove('hidden');setTimeout(()=>location.href='/dashboard',1000);}
    else{err.textContent=d.error||'Registration failed.';err.classList.remove('hidden');}
  }catch(e){err.textContent='Connection error.';err.classList.remove('hidden');}
  finally{btn.disabled=false;btn.textContent='Create Account';}
}
</script>
</body>
</html>
