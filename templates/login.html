<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sign In — Nexus Learn</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/static/css/style.css"/>
<script src="/static/js/theme.js"></script>
</head>
<body>
<nav class="navbar">
  <div class="brand" onclick="location.href='/'"><div class="brand-icon">⬡</div>NEXUS LEARN</div>
  <div class="nav-r">
    <span class="tx-m" style="font-size:13px">No account?</span>
    <a href="/register" class="btn btn-outline btn-sm">Register</a>
  </div>
</nav>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-mark">⬡</div>
      <h2>Welcome back</h2>
      <p>Sign in to continue your learning journey</p>
    </div>
    <div id="err" class="alert alert-err hidden"></div>
    <div class="fg"><label class="fl">Email address</label><input class="fi" id="email" type="email" placeholder="you@example.com" autocomplete="email"/></div>
    <div class="fg"><label class="fl">Password</label><input class="fi" id="pw" type="password" placeholder="••••••••" autocomplete="current-password"/></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center" id="btn" onclick="doLogin()">Sign In</button>
    <div class="auth-foot">Don't have an account? <a href="/register">Create one free</a></div>
  </div>
</div>
<script>
async function doLogin(){
  const email=document.getElementById('email').value.trim();
  const pw=document.getElementById('pw').value;
  const err=document.getElementById('err');
  const btn=document.getElementById('btn');
  err.classList.add('hidden');
  if(!email||!pw){err.textContent='Email and password are required.';err.classList.remove('hidden');return;}
  btn.disabled=true;btn.innerHTML='<span class="spin"></span> Signing in…';
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pw})});
    const d=await r.json();
    if(r.ok&&d.success){location.href='/dashboard';}
    else{err.textContent=d.error||'Invalid email or password.';err.classList.remove('hidden');}
  }catch(e){err.textContent='Connection error. Please try again.';err.classList.remove('hidden');}
  finally{btn.disabled=false;btn.textContent='Sign In';}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
